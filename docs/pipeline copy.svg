<svg width="1240" height="520" viewBox="0 0 1240 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Verified CodeCoT Pipeline</title>
  <desc id="desc">Three-stage pipeline: concept-to-code synthesis, execution-based code verification, and trace-grounded bidirectional chain-of-thought generation.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#1F2937" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#2563EB" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#16A34A" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-sm" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1L7 4L1 7" stroke="#374151" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .stage-label { font: 700 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #6B7280; letter-spacing: .08em; text-transform: uppercase; }
      .stage-head  { font: 700 17px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .body        { font: 400 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #374151; }
      .body-b      { font: 700 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .small       { font: 400 11.5px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #6B7280; }
      .small-b     { font: 700 11.5px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #374151; }
      .mono        { font: 600 11px "Menlo", "Courier New", monospace; fill: #1D4ED8; }
      .tag         { font: 700 11px "Avenir Next", "Helvetica Neue", Arial, sans-serif; }
      .cot-label   { font: 700 13px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #374151; }
      .footer      { font: 400 12px "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #6B7280; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1240" height="520" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════════════════════
       STAGE A — Concept-to-Code  (x: 24..390)
  ════════════════════════════════════════════════════════════════ -->
  <rect x="24" y="24" width="366" height="452" rx="16" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="42" y="52" class="stage-label" fill="#B45309">Stage A</text>
  <text x="42" y="76" class="stage-head">Concept-to-Code</text>

  <!-- Sources box -->
  <rect x="42" y="92" width="148" height="106" rx="10" fill="#FEF9C3" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="56" y="112" class="body-b">Sources</text>
  <text x="56" y="130" class="body" fill="#78350F">{pdf, HTML, JSON}</text>
  <text x="56" y="148" class="body" fill="#78350F">{Math, Algo,</text>
  <text x="56" y="164" class="body" fill="#78350F"> Phy, Chem, …}</text>
  <text x="56" y="186" class="small">document corpora</text>

  <!-- Arrow: Sources → Concepts -->
  <path d="M196 145H238" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="138" class="small">extract</text>

  <!-- Concepts node (tree icon) -->
  <rect x="244" y="92" width="118" height="106" rx="10" fill="#FDE68A" stroke="#D97706" stroke-width="1.2"/>
  <text x="263" y="126" class="body-b">Concepts</text>
  <!-- Simple tree icon -->
  <circle cx="302" cy="148" r="7" fill="#D97706"/>
  <circle cx="278" cy="168" r="6" fill="#D97706"/>
  <circle cx="302" cy="168" r="6" fill="#D97706"/>
  <circle cx="326" cy="168" r="6" fill="#D97706"/>
  <line x1="302" y1="155" x2="278" y2="162" stroke="#92400E" stroke-width="1.5"/>
  <line x1="302" y1="155" x2="302" y2="162" stroke="#92400E" stroke-width="1.5"/>
  <line x1="302" y1="155" x2="326" y2="162" stroke="#92400E" stroke-width="1.5"/>
  <text x="263" y="192" class="small">domain taxonomy</text>

  <!-- Arrow: Concepts → Instruction -->
  <path d="M302 198V236" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="307" y="222" class="small">prompt</text>

  <!-- Instruction box -->
  <rect x="136" y="242" width="198" height="42" rx="9" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="235" y="268" class="body-b" text-anchor="middle">Instruction</text>

  <!-- Arrows: Instruction ↔ Code, Instruction ↔ Test-Cases -->
  <path d="M200 284V330" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow-sm)"/>
  <path d="M192 330V288" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow-sm)"/>
  <path d="M280 284V330" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow-sm)"/>
  <path d="M272 330V288" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow-sm)"/>

  <!-- Code box -->
  <rect x="100" y="336" width="112" height="42" rx="9" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="156" y="362" class="body-b" text-anchor="middle">Code</text>

  <!-- Test-Cases box -->
  <rect x="240" y="336" width="128" height="42" rx="9" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="304" y="362" class="body-b" text-anchor="middle">Test-Cases</text>

  <!-- Caption under Stage A -->
  <text x="207" y="420" class="small" text-anchor="middle">LLM generates N code solutions</text>
  <text x="207" y="436" class="small" text-anchor="middle">and M test-case sets per instruction</text>
  <text x="207" y="460" class="small-b" text-anchor="middle">Output: (instruction, code₁..N, tests₁..M)</text>

  <!-- ═══════════════════════════════════════════════════════════════
       INTER-STAGE ARROW A → B
  ════════════════════════════════════════════════════════════════ -->
  <path d="M397 260H436" stroke="#1F2937" stroke-width="2.6" marker-end="url(#arrow)"/>
  <text x="400" y="252" class="small-b">candidate</text>
  <text x="400" y="268" class="small-b">artifacts</text>

  <!-- ═══════════════════════════════════════════════════════════════
       STAGE B — Code Verification  (x: 442..800)
  ════════════════════════════════════════════════════════════════ -->
  <rect x="442" y="24" width="360" height="452" rx="16" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="460" y="52" class="stage-label" fill="#1D4ED8">Stage B</text>
  <text x="460" y="76" class="stage-head">Code Verification</text>

  <!-- Pass / Fail column headers -->
  <text x="536" y="102" class="body-b" text-anchor="middle" fill="#16A34A">✓ Pass</text>
  <text x="700" y="102" class="body-b" text-anchor="middle" fill="#DC2626">✗ Fail</text>

  <!-- Pass column pairs -->
  <rect x="466" y="110" width="142" height="34" rx="7" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="537" y="132" class="body" text-anchor="middle">(Code, Tests)</text>
  <rect x="466" y="152" width="142" height="10" rx="3" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <rect x="466" y="168" width="142" height="10" rx="3" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <rect x="466" y="186" width="142" height="34" rx="7" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="537" y="208" class="body" text-anchor="middle">(Code, Tests)</text>

  <!-- Fail column pairs -->
  <rect x="624" y="110" width="142" height="34" rx="7" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.2"/>
  <text x="695" y="132" class="body" text-anchor="middle">(Code, Tests)</text>
  <rect x="624" y="152" width="142" height="10" rx="3" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <rect x="624" y="168" width="142" height="10" rx="3" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <rect x="624" y="186" width="142" height="34" rx="7" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.2"/>
  <text x="695" y="208" class="body" text-anchor="middle">(Code, Tests)</text>

  <!-- Cross-matching matrix -->
  <text x="622" y="260" class="body-b" text-anchor="middle">Cross-execution matrix</text>

  <!-- Code boxes in matrix -->
  <rect x="462" y="274" width="72" height="30" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="498" y="294" class="small-b" text-anchor="middle">Code 1</text>
  <rect x="462" y="312" width="72" height="30" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="498" y="332" class="small-b" text-anchor="middle">Code 2</text>
  <rect x="462" y="350" width="72" height="30" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="498" y="370" class="small-b" text-anchor="middle">Code 3</text>

  <!-- Test boxes in matrix -->
  <rect x="694" y="274" width="80" height="30" rx="6" fill="#FEF9C3" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="734" y="294" class="small-b" text-anchor="middle">Test-Case 1</text>
  <rect x="694" y="312" width="80" height="30" rx="6" fill="#FEF9C3" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="734" y="332" class="small-b" text-anchor="middle">Test-Case 2</text>
  <rect x="694" y="350" width="80" height="30" rx="6" fill="#FEF9C3" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="734" y="370" class="small-b" text-anchor="middle">Test-Case 3</text>

  <!-- Cross arrows -->
  <path d="M534 289L694 289" stroke="#374151" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-sm)"/>
  <path d="M534 289L694 327" stroke="#374151" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-sm)"/>
  <path d="M534 289L694 365" stroke="#374151" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-sm)"/>
  <path d="M534 327L694 289" stroke="#374151" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-sm)"/>
  <path d="M534 327L694 327" stroke="#374151" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-sm)"/>
  <path d="M534 327L694 365" stroke="#374151" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-sm)"/>
  <path d="M534 365L694 289" stroke="#374151" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-sm)"/>
  <path d="M534 365L694 327" stroke="#374151" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-sm)"/>
  <path d="M534 365L694 365" stroke="#374151" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-sm)"/>

  <!-- Caption under Stage B -->
  <text x="622" y="420" class="small" text-anchor="middle">All N×M pairs executed; pairs with</text>
  <text x="622" y="436" class="small" text-anchor="middle">majority agreement are kept</text>
  <text x="622" y="460" class="small-b" text-anchor="middle">Output: filtered (code, test) pairs</text>

  <!-- ═══════════════════════════════════════════════════════════════
       INTER-STAGE ARROW B → C
  ════════════════════════════════════════════════════════════════ -->
  <path d="M809 260H848" stroke="#1F2937" stroke-width="2.6" marker-end="url(#arrow)"/>
  <text x="812" y="252" class="small-b">verified</text>
  <text x="812" y="268" class="small-b">artifacts</text>

  <!-- ═══════════════════════════════════════════════════════════════
       STAGE C — CoT Generation  (x: 854..1216)
  ════════════════════════════════════════════════════════════════ -->
  <rect x="854" y="24" width="362" height="452" rx="16" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="872" y="52" class="stage-label" fill="#15803D">Stage C</text>
  <text x="872" y="76" class="stage-head">CoT Generation</text>

  <!-- Exec-trace terminal box -->
  <rect x="872" y="90" width="326" height="90" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.2"/>
  <text x="886" y="110" class="small" fill="#94A3B8">execution trace</text>
  <text x="886" y="128" class="mono">▶ def calculate_sum(n):</text>
  <text x="886" y="143" class="mono">    total = 0  # state: n=5</text>
  <text x="886" y="158" class="mono">    for i in [1,2,3,4,5]: total+=i</text>
  <!-- blinking cursor hint -->
  <rect x="886" y="164" width="80" height="8" rx="2" fill="#334155"/>

  <!-- Arrow: trace + code → LLM -->
  <path d="M1035 184V228" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1040" y="214" class="small">(code, trace)</text>

  <!-- LLM box -->
  <rect x="978" y="234" width="114" height="40" rx="9" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
  <text x="1035" y="259" class="body-b" text-anchor="middle" fill="#15803D">LLM</text>

  <!-- Fork arrows from LLM -->
  <path d="M978 254L920 298" stroke="#16A34A" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <path d="M1092 254L1150 298" stroke="#16A34A" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Forward CoT box -->
  <rect x="858" y="304" width="146" height="96" rx="10" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="931" y="324" class="small-b" text-anchor="middle">Forward CoT</text>
  <!-- timeline lines -->
  <line x1="876" y1="344" x2="988" y2="344" stroke="#374151" stroke-width="1.5"/>
  <circle cx="900" cy="344" r="4" fill="#16A34A"/>
  <circle cx="930" cy="344" r="4" fill="#16A34A"/>
  <circle cx="960" cy="344" r="4" fill="#16A34A"/>
  <line x1="876" y1="362" x2="988" y2="362" stroke="#374151" stroke-width="1.5"/>
  <circle cx="906" cy="362" r="4" fill="#16A34A"/>
  <circle cx="942" cy="362" r="4" fill="#16A34A"/>
  <text x="931" y="392" class="small" text-anchor="middle">step-by-step execution</text>

  <!-- Backward CoT box -->
  <rect x="1062" y="304" width="146" height="96" rx="10" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="1.2"/>
  <text x="1135" y="324" class="small-b" text-anchor="middle">Backward CoT</text>
  <!-- reversed timeline lines -->
  <line x1="1080" y1="344" x2="1192" y2="344" stroke="#374151" stroke-width="1.5"/>
  <circle cx="1168" cy="344" r="4" fill="#0369A1"/>
  <circle cx="1138" cy="344" r="4" fill="#0369A1"/>
  <circle cx="1108" cy="344" r="4" fill="#0369A1"/>
  <line x1="1080" y1="362" x2="1192" y2="362" stroke="#374151" stroke-width="1.5"/>
  <circle cx="1156" cy="362" r="4" fill="#0369A1"/>
  <circle cx="1120" cy="362" r="4" fill="#0369A1"/>
  <text x="1135" y="392" class="small" text-anchor="middle">goal-directed reasoning</text>

  <!-- Caption under Stage C -->
  <text x="1035" y="428" class="small" text-anchor="middle">Traces ground every reasoning step to</text>
  <text x="1035" y="444" class="small" text-anchor="middle">observed variable states &amp; control flow</text>
  <text x="1035" y="460" class="small-b" text-anchor="middle">Output: verified (CoT, code, test) triples</text>

  <!-- ═══════════════════════════════════════════════════════════════
       FOOTER GUARANTEE BANNER
  ════════════════════════════════════════════════════════════════ -->
  <rect x="24" y="490" width="1192" height="22" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="620" y="505" class="footer" text-anchor="middle">Key guarantee: every CoT rationale is checked against real variable values, state transitions, and executed control-flow paths — not inferred from static code.</text>

</svg>
